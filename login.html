<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Redirect</title>
    <style>
        .img{
            
        }
        body {
            font-family: Arial, sans-serif;
            background-image: url(1.jpeg);
            opacity: 0.8;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            
        }

        .login-box {
            margin-top: 350px;
            background: white;
            padding: 25px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: justify;
            padding-left: 10px;
            padding-top: 0px;
            padding-bottom: 0px;
            margin-top: 400px;
            background-color: rgb(241, 193, 98);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .login-box input[type="submit"] {
            background: #4facfe;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .login-box input[type="submit"]:hover {
            background: #00c6ff;
        }
    </style>
</head>
<body>


    <form style="vertical-align: text-bottom; font-family: Arial, Helvetica, sans-serif;" class="login-box" action="#" method="post">
        <h2>Login</h2>

        <label for="username">Username:-</label>
        <input type="text" id="username" name="username" placeholder="Enter Username" required>

        <label for="password">Password:-</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>

        <input type="button" value="Login" 
onclick="window.location.href='home_page.html'">
        <p>If new?<a href="register.html">Click here to Register...</a></p>
    </form>


<script>
    function redirectPage(event) {
        event.preventDefault();
        window.location.href = "https://www.google.com"; 
</script>

</body>
</html>
